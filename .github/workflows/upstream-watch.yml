# DEVLP-159: our forks vendor Botpress/@bpinternal SOURCE instead of depending on the real
# @botpress/*/@bpinternal/* packages (see README.md "The runtime libraries" and
# docs/adr/0005-opapi-as-source-of-truth.md) — that is the whole point of the fork (zero
# @botpress/@bpinternal runtime deps, see scripts/botpress-banlist.mjs). Renovate/Dependabot
# bump ranges in package.json against packages a project actually depends on; there is no such
# live dependency edge to bump here, so those tools have nothing to attach to and cannot catch
# this drift. scripts/upstream-pins.json is the only record of "which upstream version each
# fork was cut from"; this workflow is the only thing that periodically re-checks it.
#
# Precedent this exists for: botruntime-llmz's pnpm/bun patch on source-map-js@1.2.1 was lost
# during the fork and nobody noticed a schedule for re-checking upstream never existed, until
# the prod bot went silent on every agent turn (fixed in 52afff9). See the "Бамп апстрима
# форка" section in README.md for the manual checklist once this workflow flags something.
name: upstream-watch

on:
  schedule:
    # Monday 06:00 UTC — clear of any release-day traffic, comfortably before the work week.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pin-drift:
    runs-on: ubuntu-latest
    outputs:
      has-drift: ${{ steps.watch.outputs.has-drift }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Compare recorded upstream pins against the live npm registry
        id: watch
        run: |
          node --test scripts/upstream-watch.test.mjs
          if node scripts/upstream-watch.mjs --out-md=upstream-watch-report.md --out-json=upstream-watch-report.json; then
            echo "has-drift=$(node -p "JSON.parse(require('fs').readFileSync('upstream-watch-report.json','utf8')).hasDrift")" >> "$GITHUB_OUTPUT"
          else
            # A non-zero exit here means the script itself broke (bad pins.json, a registry
            # call failed in a way that isn't a confirmed 404 — see fetchLatestVersion) rather
            # than "drift was found". Fail loud instead of quietly reporting "no drift".
            echo "upstream-watch.mjs failed to produce a report — see log above" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: upstream-watch-report
          path: |
            upstream-watch-report.md
            upstream-watch-report.json
          retention-days: 90

  # ADR-0005's second sync mechanism (regenerate everything, `git diff --exit-code`) already
  # runs on every push/PR via the `check-drift` job in ci.yml. It is repeated here on the
  # weekly schedule too: check-drift.sh does an unpinned `bun install` of
  # packages/botruntime-api's @botpress/api@1.108.0 dependency (see docs/adr/0005 — the tarball
  # itself is pinned by version+lockfile, but this still gives a signal if a week goes by with
  # no pushes to main and something about that resolution changes) and, more importantly, folds
  # its result into the SAME weekly issue as the pin-drift table below instead of only being
  # visible as a green/red check on whatever PR happened to run it last.
  check-drift-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Regenerate codegen artifacts and fail on drift
        run: bash scripts/check-drift.sh

  notify:
    needs: [pin-drift, check-drift-weekly]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # One persistent, updated issue instead of a new one every week — see the label search
      # below. Do not spam: this workflow must never `gh issue create` unconditionally.
      ISSUE_LABEL: upstream-drift
      ISSUE_TITLE: "Дрейф апстрима: еженедельный отчёт (DEVLP-159)"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: upstream-watch-report
        continue-on-error: true # pin-drift may have failed before producing an artifact

      - name: Ensure the tracking label exists (idempotent — first run only)
        run: gh label create "$ISSUE_LABEL" --color "B60205" --description "DEVLP-159 weekly upstream-fork drift report" || true

      - name: Build the issue body and open/update the single tracking issue
        run: |
          set -euo pipefail

          {
            echo "_Обновляется автоматически: .github/workflows/upstream-watch.yml, запуск $(date -u +%Y-%m-%dT%H:%M:%SZ)._"
            echo
            if [ -f upstream-watch-report.md ]; then
              cat upstream-watch-report.md
            else
              echo "**pin-drift job failed before producing a report — see the workflow run log.**"
            fi
            echo
            echo "## check-drift (ADR-0005 byte-oracle regen)"
            echo
            if [ "${{ needs.check-drift-weekly.result }}" = "success" ]; then
              echo "check-drift: clean."
            else
              echo "check-drift: **${{ needs.check-drift-weekly.result }}** — regenerated codegen artifacts differ from what's committed, or the job itself broke. See the run log."
            fi
          } > issue-body.md

          # Scoped by label only (this workflow is the sole creator of "$ISSUE_LABEL" issues) —
          # one persistent issue, updated in place, never a new one per run.
          existing_issue="$(gh issue list --state open --label "$ISSUE_LABEL" --json number --jq '.[0].number // empty')"

          if [ -n "$existing_issue" ]; then
            gh issue edit "$existing_issue" --body-file issue-body.md
            echo "Updated existing issue #$existing_issue"
          else
            gh issue create --title "$ISSUE_TITLE" --label "$ISSUE_LABEL" --body-file issue-body.md
          fi

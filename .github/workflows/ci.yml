# CI drift-check (ADR-0005 sync mechanism #2: "regenerate all, git diff must be clean").
# scripts/check-drift.sh existed but wasn't wired into any workflow — a hand-edit to a
# generated file (src/gen, openapi/) would pass review silently and get wiped on the next
# `bun run generate` with no CI signal. Runs on every push/PR so drift is caught before merge.
name: ci

on:
  push:
    branches:
      - main
      - fork-botpress-deps
  pull_request:

permissions:
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Regenerate codegen artifacts and fail on drift
        run: bash scripts/check-drift.sh

  docs-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout public platform documentation from main
        id: checkout_platform_docs
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: HolocronLab/botforge
          ref: main
          path: .peer/botforge
          fetch-depth: 1

      - name: Retry public platform documentation checkout
        if: steps.checkout_platform_docs.outcome == 'failure'
        uses: actions/checkout@v4
        with:
          repository: HolocronLab/botforge
          ref: main
          path: .peer/botforge
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install brt contract-generator dependencies
        working-directory: packages/brt
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Verify contract matches the command tree and schemas
        working-directory: packages/brt
        run: |
          bun run docs:contract:check
          bun run docs:contract:test

      - name: Verify public platform documentation matches this contract
        run: node .peer/botforge/docs-site/scripts/check-brt-docs-contract.mjs packages/brt/brt-docs-contract.json

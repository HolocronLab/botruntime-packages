# Publish brt CLI as a GitHub Release asset after the registry train is coherent,
# or directly for an explicit manual ref. Install for a developer:
#   bun add -g <release-asset-url>   (or download the .tgz + bun link). Requires bun >=1.3.
name: publish-brt

on:
  workflow_call:
    inputs:
      ref:
        description: "branch, tag, or SHA to pack brt from"
        required: false
        type: string
        default: ""
      tag:
        description: "release tag to create for a serialized package-train invocation"
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      ref:
        description: "branch/sha to pack brt from"
        required: false
        default: main

permissions:
  contents: write
  packages: read

jobs:
  pack-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Rewrite brt local file deps to published registry versions
        run: |
          node scripts/prepare-brt-publish.mjs --write
          mv packages/brt/bun.lock "$RUNNER_TEMP/brt.source.bun.lock"

      - name: Install + typecheck brt from registry dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_NPM_REGISTRY: "https://registry.npmjs.org"
        run: |
          node scripts/registry-release-readiness.mjs packages/brt/package.json
          cd packages/brt
          bun install --no-save --ignore-scripts
          bun run typecheck

      - name: Pack brt
        working-directory: packages/brt
        run: |
          bun pm pack --destination "$GITHUB_WORKSPACE/dist-brt"
          ls -la "$GITHUB_WORKSPACE/dist-brt"

      - name: Publish prerelease with the tarball
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Release against the SHA actually checked out (inputs.ref on dispatch), not the
          # workflow's github.sha which may point at a different commit.
          SHA="$(git rev-parse HEAD)"
          # Only the serialized catalog caller may provide a coherent brt-v* marker.
          # Manual tarballs always get a dev tag, even when their ref names a release tag.
          TAG="${{ inputs.tag }}"
          case "$TAG" in brt-v*) ;; *) TAG="brt-dev-${SHA:0:8}";; esac
          gh release create "$TAG" dist-brt/*.tgz \
            --prerelease --target "$SHA" \
            --title "brt CLI ($TAG)" \
            --notes "brt dev-kit CLI for botruntime.ru. Install: bun add -g <this .tgz url>. Requires bun >=1.3." \
            || gh release upload "$TAG" dist-brt/*.tgz --clobber

name: publish-adk-package

on:
  push:
    tags:
      - "adk-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "branch, tag, or SHA to publish botruntime-adk from"
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@holocronlab"

      - name: Resolve local package dependencies to registry versions
        run: |
          node scripts/prepare-package-publish.mjs --package=packages/botruntime-adk --write
          mv packages/botruntime-adk/bun.lock "$RUNNER_TEMP/botruntime-adk.source.bun.lock"

      - name: Install, test, and build botruntime-adk
        working-directory: packages/botruntime-adk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun install --no-save --ignore-scripts
          bun run check:type
          bun run test
          bun run build

      - name: Publish botruntime-adk to GitHub Packages
        working-directory: packages/botruntime-adk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-adk@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-adk@$VER already published — skipping (immutable registry)."
          else
            npm publish
          fi

name: publish-all-public-packages

on:
  push:
    tags:
      - "adk-v*"
      - "brt-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "branch, tag, or SHA to publish the anonymous-consumer package catalog from"
        required: false
        default: main

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      release-sha: ${{ steps.release-ref.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          fetch-depth: 0

      # Single source of truth (DEVLP-162): scripts/package-order.mjs, shared
      # with ci.yml's fork-package-catalog and fork-package-tests jobs.
      - name: Resolve packages/* build order
        id: package-order
        # Гард для исторических ref: workflow-файл берётся из ветки диспатча, а
        # checkout — из inputs.ref; у ref старше DEVLP-162 файла нет, и без гарда
        # это был бы малопонятный MODULE_NOT_FOUND.
        run: |
          if [ ! -f scripts/package-order.mjs ]; then
            echo "::error::этот ref предшествует централизованному package-order (DEVLP-162). Для публикации исторического ref создайте временную ветку с него и cherry-pick'ните коммит с scripts/package-order.mjs, либо публикуйте актуальный main."
            exit 1
          fi
          echo "list=$(node scripts/package-order.mjs)" >> "$GITHUB_OUTPUT"

      # DEVLP-174: публикация с неконсьюмленными changeset-заметками паковала бы
      # новый source под СТАРЫМ иммутабельным npm-semver и молча съедала записи —
      # релиз обязан начинаться с changeset-version.mjs.
      - name: No pending changesets
        run: node scripts/changeset-lint.mjs --require-empty

      - name: Resolve immutable release SHA
        id: release-ref
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve previous coherent release
        id: release-base
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          base_ref="$(gh release list --limit 100 --json tagName,publishedAt,isDraft \
            --jq '[.[] | select(.isDraft == false and (.tagName | startswith("brt-v")))] | sort_by(.publishedAt) | last | .tagName')"
          if [[ ! "$base_ref" =~ ^brt-v ]]; then
            echo "No previous coherent brt release found" >&2
            exit 1
          fi
          git cat-file -e "${base_ref}^{commit}"
          echo "ref=$base_ref" >> "$GITHUB_OUTPUT"

      - name: Verify immutable release version closure
        run: node scripts/release-version-closure.mjs --base="${{ steps.release-base.outputs.ref }}"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@holocronlab"
          package-manager-cache: false

      - name: Install the npm CLI with trusted publishing support
        run: npm install --global npm@11.15.0

      - name: Regenerate checked-in client sources
        run: bash scripts/regen.sh

      - name: Build, verify, and publish the complete public catalog
        env:
          PUBLIC_NPM_REGISTRY: "https://registry.npmjs.org"
          PACKAGE_ORDER: ${{ steps.package-order.outputs.list }}
        shell: bash
        run: |
          set -euo pipefail

          run_script_if_present() {
            local package_dir="$1"
            local script="$2"
            if node -e "const p=require('./${package_dir}/package.json'); process.exit(p.scripts?.['${script}'] ? 0 : 1)"; then
              (cd "$package_dir" && bun run "$script")
            fi
          }

          install_package_dependencies() {
            local package_dir="$1"
            local patches_path="$package_dir/patches"
            local linked_patches=0

            if [ ! -e "$patches_path" ] && [ ! -L "$patches_path" ]; then
              ln -s ../botruntime-llmz/patches "$patches_path"
              linked_patches=1
            fi

            local install_status=0
            (cd "$package_dir" && bun install --ignore-scripts --no-save) || install_status=$?
            if [ "$linked_patches" -eq 1 ]; then
              unlink "$patches_path"
            fi
            return "$install_status"
          }

          for package in $PACKAGE_ORDER; do
            package_dir="packages/$package"
            echo "::group::Build and verify $package"

            install_package_dependencies "$package_dir"
            run_script_if_present "$package_dir" check:type
            run_script_if_present "$package_dir" typecheck
            run_script_if_present "$package_dir" build
            run_script_if_present "$package_dir" test
            echo "::endgroup::"
          done

          published_specs=()
          for package in $PACKAGE_ORDER; do
            package_dir="packages/$package"
            echo "::group::Prepare and publish $package"

            node scripts/prepare-package-publish.mjs --package="$package_dir" --write
            version="$(node -p "require('./${package_dir}/package.json').version")"
            name="$(node -p "require('./${package_dir}/package.json').name")"

            if npm view "$name@$version" version --userconfig=/dev/null --registry="$PUBLIC_NPM_REGISTRY" >/dev/null 2>&1; then
              echo "$name@$version already published — skipping immutable version."
            else
              (cd "$package_dir" && npm publish --access public --ignore-scripts)
            fi

            published_specs+=("$name@$version")
            echo "::endgroup::"
          done

          for attempt in $(seq 1 60); do
            missing_specs=()
            for spec in "${published_specs[@]}"; do
              if ! npm view "$spec" version --userconfig=/dev/null --registry="$PUBLIC_NPM_REGISTRY" >/dev/null 2>&1; then
                missing_specs+=("$spec")
              fi
            done
            if [ "${#missing_specs[@]}" -eq 0 ]; then
              break
            fi
            if [ "$attempt" -eq 60 ]; then
              printf 'Packages did not become anonymously installable within 5 minutes:\n' >&2
              printf '  %s\n' "${missing_specs[@]}" >&2
              exit 1
            fi
            sleep 5
          done

          brt_version="$(node -p "require('./packages/brt/package.json').version")"
          consumer_dir="$(mktemp -d)"
          npm install \
            --prefix "$consumer_dir" \
            --ignore-scripts \
            --package-lock=false \
            --userconfig=/dev/null \
            --registry="$PUBLIC_NPM_REGISTRY" \
            "@holocronlab/brt@$brt_version"
          node scripts/verify-installed-release-train.mjs --consumer="$consumer_dir"

  pack-brt:
    needs: publish
    permissions:
      contents: write
      packages: read
    uses: ./.github/workflows/publish-brt.yml
    with:
      ref: ${{ needs.publish.outputs.release-sha }}
      tag: ${{ github.ref_name }}

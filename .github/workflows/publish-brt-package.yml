# Publish @holocronlab/brt publicly to npmjs. Trigger: tag brt-v* (points at any
# branch/sha) or manual dispatch. Consumers do not need a registry token.
name: publish-brt-package

on:
  push:
    tags:
      - "brt-v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "branch/sha to publish brt from"
        required: false
        default: main

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@holocronlab"

      - name: Rewrite brt local file deps to published registry versions
        run: |
          node scripts/prepare-brt-publish.mjs --write
          mv packages/brt/bun.lock "$RUNNER_TEMP/brt.source.bun.lock"

      - name: Install and typecheck brt from registry dependencies
        working-directory: packages/brt
        run: |
          bun install --no-save --ignore-scripts
          bun run typecheck

      - name: Publish brt publicly to npmjs (skip if this version is already published)
        working-directory: packages/brt
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/brt@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/brt@$VER already published — skipping (immutable registry)."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

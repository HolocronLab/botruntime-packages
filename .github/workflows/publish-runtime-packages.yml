name: publish-runtime-packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch, tag, or SHA to publish client, SDK, evals, runtime, and ADK from"
        required: false
        default: main

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"
          scope: "@holocronlab"

      - name: Regenerate, test, and build botruntime-client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/regen.sh
          cd packages/botruntime-client
          bun run check:type
          bun run test

      - name: Publish botruntime-client
        working-directory: packages/botruntime-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-client@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-client@$VER already published — skipping."
          else
            npm publish
          fi

      - name: Wait until botruntime-client is installable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./packages/botruntime-client/package.json').version")"
          for attempt in $(seq 1 12); do
            if npm view "@holocronlab/botruntime-client@$VER" version >/dev/null 2>&1; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "botruntime-client@$VER did not become installable" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Resolve, test, and build botruntime-sdk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/prepare-package-publish.mjs --package=packages/botruntime-sdk --write
          mv packages/botruntime-sdk/bun.lock "$RUNNER_TEMP/botruntime-sdk.source.bun.lock"
          cd packages/botruntime-sdk
          bun install --no-save --ignore-scripts
          bun run check:type
          bun run test
          bun run build

      - name: Publish botruntime-sdk
        working-directory: packages/botruntime-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-sdk@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-sdk@$VER already published — skipping."
          else
            npm publish
          fi

      - name: Wait until botruntime-sdk is installable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./packages/botruntime-sdk/package.json').version")"
          for attempt in $(seq 1 12); do
            if npm view "@holocronlab/botruntime-sdk@$VER" version >/dev/null 2>&1; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "botruntime-sdk@$VER did not become installable" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Resolve, test, and build botruntime-evals
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/prepare-package-publish.mjs --package=packages/botruntime-evals --write
          mv packages/botruntime-evals/bun.lock "$RUNNER_TEMP/botruntime-evals.source.bun.lock"
          cd packages/botruntime-evals
          bun install --no-save --ignore-scripts
          bun run check:type
          bun run test
          bun run build

      - name: Publish botruntime-evals
        working-directory: packages/botruntime-evals
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-evals@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-evals@$VER already published — skipping."
          else
            npm publish
          fi

      - name: Wait until botruntime-evals is installable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./packages/botruntime-evals/package.json').version")"
          for attempt in $(seq 1 12); do
            if npm view "@holocronlab/botruntime-evals@$VER" version >/dev/null 2>&1; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "botruntime-evals@$VER did not become installable" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Resolve, test, and build botruntime-runtime
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/prepare-package-publish.mjs --package=packages/botruntime-runtime --write
          mv packages/botruntime-runtime/bun.lock "$RUNNER_TEMP/botruntime-runtime.source.bun.lock"
          cd packages/botruntime-runtime
          bun install --no-save --ignore-scripts
          bun run check:type
          bun run test
          bun run build

      - name: Publish botruntime-runtime
        working-directory: packages/botruntime-runtime
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-runtime@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-runtime@$VER already published — skipping."
          else
            npm publish
          fi

      - name: Wait until botruntime-runtime is installable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./packages/botruntime-runtime/package.json').version")"
          for attempt in $(seq 1 12); do
            if npm view "@holocronlab/botruntime-runtime@$VER" version >/dev/null 2>&1; then
              exit 0
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "botruntime-runtime@$VER did not become installable" >&2
              exit 1
            fi
            sleep 5
          done

      - name: Resolve, test, and build botruntime-adk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/prepare-package-publish.mjs --package=packages/botruntime-adk --write
          mv packages/botruntime-adk/bun.lock "$RUNNER_TEMP/botruntime-adk.source.bun.lock"
          cd packages/botruntime-adk
          bun install --no-save --ignore-scripts
          bun run check:type
          bun run test
          bun run build

      - name: Publish botruntime-adk
        working-directory: packages/botruntime-adk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="$(node -p "require('./package.json').version")"
          if npm view "@holocronlab/botruntime-adk@$VER" version >/dev/null 2>&1; then
            echo "@holocronlab/botruntime-adk@$VER already published — skipping."
          else
            npm publish
          fi

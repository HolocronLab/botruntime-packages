# Reconcile repository integrations with the global catalog: publish active definitions, then retire explicit tombstones.
#
# The platform workspace is the only workspace allowed to deploy public
# integrations. BRT_API_KEY must therefore belong to that workspace, while
# BRT_WORKSPACE_ID is stored as a repository variable. A workflow input may
# override the variable for an explicit operator-run smoke.
name: publish-integrations-catalog

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "branch/sha to publish integration definitions from"
        required: false
        default: main
      api_url:
        description: "cloudapi base URL"
        required: false
        default: https://botruntime.ru
      workspace_id:
        description: "optional platform workspace override"
        required: false
      workspace_handle:
        description: "public handle of the platform workspace"
        required: false
        default: botruntime

permissions:
  contents: read

concurrency:
  group: publish-integrations-catalog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      BRT_WORKSPACE_ID: ${{ inputs.workspace_id || vars.BRT_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          scope: "@holocronlab"

      - name: Install the published brt CLI
        run: npm install --global --userconfig=/dev/null @holocronlab/brt@0.6.0

      - name: Install all integration dependencies
        shell: bash
        run: |
          shopt -s nullglob
          definitions=(integrations/*/integration.definition.ts)
          test "${#definitions[@]}" -gt 0
          for definition in "${definitions[@]}"; do
            integration_dir="$(dirname "$definition")"
            echo "Installing $integration_dir"
            (cd "$integration_dir" && bun install --frozen-lockfile --ignore-scripts)
          done

      - name: Authenticate brt
        env:
          BRT_TOKEN: ${{ secrets.BRT_API_KEY }}
        run: |
          test -n "$BRT_TOKEN"
          test -n "$BRT_WORKSPACE_ID"
          brt login \
            --api-url "${{ inputs.api_url }}" \
            --workspaceId "$BRT_WORKSPACE_ID" -y

      - name: Publish all integrations globally
        shell: bash
        run: |
          shopt -s nullglob
          definitions=(integrations/*/integration.definition.ts)
          test "${#definitions[@]}" -gt 0
          for definition in "${definitions[@]}"; do
            integration_dir="$(dirname "$definition")"
            metadata="$(brt read --workDir "$integration_dir" --json)"
            source_name="$(jq -r '.name' <<<"$metadata")"
            version="$(jq -r '.version' <<<"$metadata")"
            qualified_name="${{ inputs.workspace_handle }}/$source_name"
            catalog="$(brt integrations list \
              --json \
              --owned \
              --name "$qualified_name" \
              --versionNumber "$version" \
              --limit 10)"
            decision="$(node scripts/catalog-publication-decision.mjs "$qualified_name" "$version" <<<"$catalog")"
            if [[ "$decision" == "skip" ]]; then
              echo "Already public: $qualified_name@$version"
              continue
            fi
            echo "Publishing $integration_dir as public"
            brt deploy \
              --workDir "$integration_dir" \
              --visibility public \
              -y
          done

      # Retire only after every active definition publishes successfully, so a failed
      # replacement deploy cannot leave the catalog without a working integration.
      - name: Retire tombstoned integrations
        if: ${{ inputs.api_url == 'https://botruntime.ru' }}
        shell: bash
        env:
          BRT_TOKEN: ${{ secrets.BRT_API_KEY }}
          BRT_API_URL: https://botruntime.ru
        run: |
          while IFS= read -r retired; do
            qualified_name="$(jq -er '.name' <<<"$retired")"
            version="$(jq -er '.version' <<<"$retired")"
            catalog="$(brt integrations list \
              --json \
              --owned \
              --name "$qualified_name" \
              --versionNumber "$version" \
              --limit 10)"
            decision="$(node scripts/catalog-retirement-decision.mjs \
              "$qualified_name" "$version" <<<"$catalog")"
            if [[ "$(jq -r '.action' <<<"$decision")" == "skip" ]]; then
              echo "Already absent: $qualified_name@$version"
              continue
            fi
            integration_id="$(jq -er '.id' <<<"$decision")"
            echo "Retiring $qualified_name@$version (id $integration_id)"
            # brt@0.6.0 resolves name refs through a private-only lookup and rejects
            # an already-public integration before calling this authenticated endpoint.
            curl --fail --silent --show-error --output /dev/null \
              --request DELETE \
              --header "Authorization: Bearer $BRT_TOKEN" \
              --header "x-workspace-id: $BRT_WORKSPACE_ID" \
              "$BRT_API_URL/v1/admin/integrations/$integration_id"
          done < <(jq -c '.[]' scripts/catalog-retired-integrations.json)
